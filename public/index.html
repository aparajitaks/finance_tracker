<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --bg: #0f172a; --surface: #1e293b;
            --surface2: #334155; --text: #f1f5f9; --text-dim: #94a3b8; --green: #10b981;
            --red: #ef4444; --yellow: #f59e0b; --border: #475569; --radius: 12px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Auth */
        .auth-overlay { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--surface); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,.5); }
        .auth-card h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--bg); border-radius: 8px; padding: 4px; }
        .auth-tabs button { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 14px; transition: all .2s; }
        .auth-tabs button.active { background: var(--primary); color: white; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
        input, select { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border .2s; }
        input:focus, select:focus { border-color: var(--primary); }
        select { cursor: pointer; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn-danger { background: var(--red); color: white; font-size: 12px; padding: 6px 12px; width: auto; border-radius: 6px; }
        .error-msg { color: var(--red); font-size: 13px; margin-top: 8px; }
        .success-msg { color: var(--green); font-size: 13px; margin-top: 8px; }

        /* App Layout */
        .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .app-header h1 { font-size: 24px; background: linear-gradient(135deg, var(--primary), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info span { color: var(--text-dim); font-size: 14px; }
        .btn-logout { padding: 8px 16px; width: auto; font-size: 13px; }

        /* Stats Grid */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--surface); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .stat-card.income::before { background: linear-gradient(90deg, var(--green), #34d399); }
        .stat-card.expense::before { background: linear-gradient(90deg, var(--red), #f87171); }
        .stat-card.savings::before { background: linear-gradient(90deg, var(--primary), #818cf8); }
        .stat-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); border-radius: 10px; padding: 4px; overflow-x: auto; }
        .tabs button { padding: 10px 20px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; border-radius: 8px; font-weight: 500; font-size: 14px; transition: all .2s; white-space: nowrap; font-family: inherit; }
        .tabs button.active { background: var(--primary); color: white; }

        /* Cards */
        .content-grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 24px; }
        .card h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        /* Transaction List */
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--surface2); }
        .tx-item:last-child { border-bottom: none; }
        .tx-left { flex: 1; }
        .tx-desc { font-weight: 500; font-size: 15px; }
        .tx-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        .tx-amount { font-weight: 700; font-size: 16px; min-width: 100px; text-align: right; }
        .tx-amount.income { color: var(--green); }
        .tx-amount.expense { color: var(--red); }
        .tx-actions { margin-left: 12px; }

        /* Budget Bar */
        .budget-item { background: var(--bg); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .budget-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .budget-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
        .budget-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
        .budget-fill.ok { background: var(--green); }
        .budget-fill.warn { background: var(--yellow); }
        .budget-fill.over { background: var(--red); }
        .budget-stats { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--text-dim); }

        /* Report */
        .report-month { background: var(--bg); border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .report-label { font-weight: 600; font-size: 15px; }
        .report-figures { display: flex; gap: 20px; font-size: 14px; }
        .report-figures .green { color: var(--green); }
        .report-figures .red { color: var(--red); }

        .hidden { display: none !important; }
        .empty-state { text-align: center; color: var(--text-dim); padding: 40px 0; font-size: 14px; }

        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            .content-grid { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h1>💰 Finance Tracker</h1>
            <p>Track your income, expenses, and savings</p>
            <div class="auth-tabs">
                <button class="active" onclick="showAuthTab('login')">Login</button>
                <button onclick="showAuthTab('register')">Register</button>
            </div>
            <div id="login-form">
                <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"></div>
                <button class="btn btn-primary" onclick="doLogin()">Login</button>
            </div>
            <div id="register-form" class="hidden">
                <div class="form-group"><label>Name</label><input type="text" id="reg-name" placeholder="John Doe"></div>
                <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="reg-pass" placeholder="Min 6 characters"></div>
                <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
            </div>
            <p id="auth-msg"></p>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="app hidden">
        <div class="app-header">
            <h1>💰 Finance Tracker</h1>
            <div class="user-info">
                <span id="user-name"></span>
                <button class="btn btn-secondary btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="stats">
            <div class="stat-card income"><div class="stat-label">Total Income</div><div class="stat-value green" id="s-income">₹0</div></div>
            <div class="stat-card expense"><div class="stat-label">Total Expense</div><div class="stat-value red" id="s-expense">₹0</div></div>
            <div class="stat-card savings"><div class="stat-label">Savings</div><div class="stat-value" id="s-savings">₹0</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="active" onclick="switchTab('transactions')">Transactions</button>
            <button onclick="switchTab('budgets')">Budgets</button>
            <button onclick="switchTab('reports')">Reports</button>
        </div>

        <!-- TRANSACTIONS TAB -->
        <div id="tab-transactions" class="content-grid">
            <div class="card">
                <h2>➕ Add Transaction</h2>
                <div class="form-group"><label>Amount (₹)</label><input type="number" id="tx-amount" step="0.01" placeholder="0.00"></div>
                <div class="form-group"><label>Type</label>
                    <select id="tx-type"><option value="expense">Expense</option><option value="income">Income</option></select>
                </div>
                <div class="form-group"><label>Description</label><input type="text" id="tx-desc" placeholder="What was this for?"></div>
                <div class="form-group"><label>Category</label><select id="tx-cat"></select></div>
                <div class="form-group"><label>Date</label><input type="date" id="tx-date"></div>
                <button class="btn btn-primary" onclick="addTx()">Add Transaction</button>
                <p id="tx-msg"></p>
            </div>
            <div class="card">
                <h2>📋 Recent Transactions</h2>
                <div id="tx-list"></div>
            </div>
        </div>

        <!-- BUDGETS TAB -->
        <div id="tab-budgets" class="content-grid hidden">
            <div class="card">
                <h2>🎯 Set Budget</h2>
                <div class="form-group"><label>Category</label><select id="bud-cat"></select></div>
                <div class="form-group"><label>Monthly Limit (₹)</label><input type="number" id="bud-limit" step="0.01" placeholder="5000"></div>
                <div class="form-group"><label>Month</label><input type="month" id="bud-month"></div>
                <button class="btn btn-primary" onclick="setBudget()">Set Budget</button>
                <p id="bud-msg"></p>
            </div>
            <div class="card">
                <h2>📊 Your Budgets</h2>
                <div id="bud-list"></div>
            </div>
        </div>

        <!-- REPORTS TAB -->
        <div id="tab-reports" class="hidden">
            <div class="card">
                <h2>📈 Monthly Report</h2>
                <div id="report-summary" style="display:flex;gap:20px;margin-bottom:20px;"></div>
                <div id="report-list"></div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem("ft_token");
        let userName = localStorage.getItem("ft_user");
        const $ = s => document.querySelector(s);
        const fmt = n => `₹${Number(n).toLocaleString("en-IN", { minimumFractionDigits: 0 })}`;

        if (token) showApp();

        // ── Auth ──
        function showAuthTab(tab) {
            document.querySelectorAll(".auth-tabs button").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");
            $("#login-form").classList.toggle("hidden", tab !== "login");
            $("#register-form").classList.toggle("hidden", tab !== "register");
            $("#auth-msg").textContent = "";
        }

        async function doLogin() {
            const res = await api("/auth/login", "POST", {
                email: $("#login-email").value, password: $("#login-pass").value
            });
            if (res.token) { saveAuth(res); showApp(); }
            else { $("#auth-msg").textContent = res.msg || "Login failed"; $("#auth-msg").className = "error-msg"; }
        }

        async function doRegister() {
            const res = await api("/auth/register", "POST", {
                name: $("#reg-name").value, email: $("#reg-email").value, password: $("#reg-pass").value
            });
            if (res.token) { saveAuth(res); showApp(); }
            else { $("#auth-msg").textContent = res.msg || "Registration failed"; $("#auth-msg").className = "error-msg"; }
        }

        function saveAuth(data) {
            token = data.token; userName = data.user.name;
            localStorage.setItem("ft_token", token);
            localStorage.setItem("ft_user", userName);
        }

        function logout() { localStorage.clear(); location.reload(); }

        // ── App ──
        async function showApp() {
            $("#auth-screen").classList.add("hidden");
            $("#app-screen").classList.remove("hidden");
            $("#user-name").textContent = userName || "";
            $("#tx-date").value = new Date().toISOString().slice(0, 10);
            $("#bud-month").value = new Date().toISOString().slice(0, 7);
            await loadAll();
        }

        async function loadAll() {
            const [dash, cats, txs] = await Promise.all([
                api("/dashboard"), api("/categories"), api("/transactions")
            ]);

            // Stats
            $("#s-income").textContent = fmt(dash.totalIncome);
            $("#s-expense").textContent = fmt(dash.totalExpense);
            $("#s-savings").textContent = fmt(dash.savings);

            // Category dropdowns
            const catOpts = cats.map(c => `<option value="${c.id}">${c.name} (${c.type})</option>`).join("");
            $("#tx-cat").innerHTML = catOpts;
            $("#bud-cat").innerHTML = cats.filter(c => c.type === "expense").map(c => `<option value="${c.id}">${c.name}</option>`).join("");

            // Transactions
            if (txs.length === 0) {
                $("#tx-list").innerHTML = '<div class="empty-state">No transactions yet. Add your first one!</div>';
            } else {
                $("#tx-list").innerHTML = txs.slice(0, 15).map(t => `
                    <div class="tx-item">
                        <div class="tx-left">
                            <div class="tx-desc">${esc(t.description)}</div>
                            <div class="tx-meta">${t.category?.name || "—"} • ${new Date(t.date).toLocaleDateString("en-IN")}</div>
                        </div>
                        <div class="tx-amount ${t.type}">${t.type === "income" ? "+" : "−"}${fmt(Math.abs(t.amount))}</div>
                        <div class="tx-actions"><button class="btn btn-danger" onclick="delTx(${t.id})">✕</button></div>
                    </div>
                `).join("");
            }

            loadBudgets();
            loadReports();
        }

        // ── Transactions ──
        async function addTx() {
            const body = {
                amount: parseFloat($("#tx-amount").value),
                type: $("#tx-type").value,
                description: $("#tx-desc").value,
                categoryId: parseInt($("#tx-cat").value),
                date: $("#tx-date").value
            };
            const res = await api("/transactions", "POST", body);
            if (res.id) {
                $("#tx-msg").textContent = "Transaction added!";
                $("#tx-msg").className = "success-msg";
                $("#tx-amount").value = ""; $("#tx-desc").value = "";
                await loadAll();
            } else {
                $("#tx-msg").textContent = res.msg || "Failed";
                $("#tx-msg").className = "error-msg";
            }
            setTimeout(() => $("#tx-msg").textContent = "", 3000);
        }

        async function delTx(id) {
            if (!confirm("Delete this transaction?")) return;
            await api(`/transactions/${id}`, "DELETE");
            await loadAll();
        }

        // ── Budgets ──
        async function setBudget() {
            const res = await api("/budgets", "POST", {
                categoryId: parseInt($("#bud-cat").value),
                limit: parseFloat($("#bud-limit").value),
                month: $("#bud-month").value
            });
            if (res.id) {
                $("#bud-msg").textContent = "Budget set!"; $("#bud-msg").className = "success-msg";
                await loadBudgets();
            } else {
                $("#bud-msg").textContent = res.msg || "Failed"; $("#bud-msg").className = "error-msg";
            }
            setTimeout(() => $("#bud-msg").textContent = "", 3000);
        }

        async function loadBudgets() {
            const month = new Date().toISOString().slice(0, 7);
            const budgets = await api(`/budgets?month=${month}`);
            if (!Array.isArray(budgets) || budgets.length === 0) {
                $("#bud-list").innerHTML = '<div class="empty-state">No budgets set for this month</div>';
                return;
            }
            $("#bud-list").innerHTML = budgets.map(b => {
                const pct = b.limit > 0 ? Math.min((b.spent / b.limit) * 100, 100) : 0;
                const cls = pct >= 100 ? "over" : pct >= 75 ? "warn" : "ok";
                return `
                    <div class="budget-item">
                        <div class="budget-header">
                            <strong>${b.category?.name || "Category"}</strong>
                            <span>${b.exceeded ? "🔴 Exceeded" : "🟢 On Track"}</span>
                        </div>
                        <div class="budget-bar"><div class="budget-fill ${cls}" style="width:${pct}%"></div></div>
                        <div class="budget-stats">
                            <span>Spent: ${fmt(b.spent)}</span>
                            <span>Limit: ${fmt(b.limit)}</span>
                            <span>Left: ${fmt(Math.max(b.remaining, 0))}</span>
                        </div>
                    </div>`;
            }).join("");
        }

        // ── Reports ──
        async function loadReports() {
            const data = await api("/reports/monthly");
            if (!data.summary) return;
            $("#report-summary").innerHTML = `
                <div class="stat-card" style="flex:1"><div class="stat-label">Total Income</div><div class="stat-value green">${fmt(data.summary.totalIncome)}</div></div>
                <div class="stat-card" style="flex:1"><div class="stat-label">Total Expense</div><div class="stat-value red">${fmt(data.summary.totalExpense)}</div></div>
                <div class="stat-card" style="flex:1"><div class="stat-label">Net Savings</div><div class="stat-value">${fmt(data.summary.savings)}</div></div>
            `;
            if (!data.monthly || data.monthly.length === 0) {
                $("#report-list").innerHTML = '<div class="empty-state">No data yet</div>';
                return;
            }
            $("#report-list").innerHTML = data.monthly.map(m => `
                <div class="report-month">
                    <div class="report-label">${m.month}</div>
                    <div class="report-figures">
                        <span class="green">+${fmt(m.income)}</span>
                        <span class="red">−${fmt(m.expense)}</span>
                        <strong>${fmt(m.balance)}</strong>
                        <span style="color:var(--text-dim)">${m.transactions} txns</span>
                    </div>
                </div>`).join("");
        }

        // ── Tabs ──
        function switchTab(tab) {
            document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
            event.target.classList.add("active");
            ["transactions", "budgets", "reports"].forEach(t => {
                $(`#tab-${t}`).classList.toggle("hidden", t !== tab);
            });
        }

        // ── API Helper ──
        async function api(path, method = "GET", body = null) {
            try {
                const opts = { method, headers: { "Content-Type": "application/json" } };
                if (token) opts.headers["Authorization"] = `Bearer ${token}`;
                if (body) opts.body = JSON.stringify(body);
                const r = await fetch(path, opts);
                if (r.status === 401) { logout(); return {}; }
                return await r.json();
            } catch (e) { console.error("API error:", e); return {}; }
        }

        function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>
